<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-root" id="popup-root">
      <!-- Header -->
      <header class="header">
        <div class="header-logo">
          <img src="mindfolio.png" alt="Mindfolio" class="logo-img" />
          <span class="logo-text">Mindfolio</span>
        </div>
        <a
          id="open-app-btn"
          href="#"
          class="header-icon-btn"
          title="Open Mindfolio"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 3h6v6" />
            <path d="M10 14 21 3" />
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          </svg>
        </a>
      </header>

      <!-- Main form view -->
      <main id="form-view" class="form-view">
        <!-- Page info (auto-filled) -->
        <div class="field-group">
          <label class="field-label" for="page-url">Current Page</label>
          <div class="input-readonly-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="input-icon"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
              <path d="M2 12h20" />
            </svg>
            <input
              id="page-url"
              type="text"
              class="field-input input-with-icon"
              placeholder="Loading page URL…"
              readonly
            />
          </div>
        </div>

        <!-- Title -->
        <div class="field-group">
          <label class="field-label" for="page-title">Title</label>
          <input
            id="page-title"
            type="text"
            class="field-input"
            placeholder="Page title…"
          />
        </div>

        <!-- Note (optional) -->
        <div class="field-group">
          <label class="field-label" for="page-note">Note <span class="optional-tag">optional</span></label>
          <textarea
            id="page-note"
            class="field-textarea"
            placeholder="Add a personal note…"
            rows="3"
          ></textarea>
        </div>

        <!-- Type badge row -->
        <div class="field-group">
          <label class="field-label">Content Type</label>
          <div class="type-badge-row" id="type-badge-row">
            <span class="type-badge" id="type-badge">webpage</span>
          </div>
        </div>
      </main>

      <!-- Success view (hidden) -->
      <div id="success-view" class="success-view hidden">
        <div class="success-icon-wrapper">
          <div class="success-ring"></div>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="36"
            height="36"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="success-check"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <p class="success-title">Saved to Mindfolio!</p>
        <p class="success-subtitle">This page has been added to your second&nbsp;brain.</p>
        <button id="close-btn" class="btn-close-success">Close Tab</button>
      </div>

      <!-- Error view (hidden) -->
      <div id="error-view" class="error-view hidden">
        <div class="error-icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
        </div>
        <p class="error-title" id="error-msg">Something went wrong</p>
        <button id="retry-btn" class="btn-retry">Try Again</button>
      </div>

      <!-- Auth error view (hidden) -->
      <div id="auth-view" class="auth-view hidden">
        <div class="auth-icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
        <p class="auth-title">Not signed in</p>
        <p class="auth-subtitle">Sign in to Mindfolio to save content.</p>
        <button id="login-btn" class="btn-login">Sign In</button>
      </div>

      <!-- Footer action area -->
      <footer id="form-footer" class="footer">
        <button id="save-btn" class="btn-primary">
          <span id="save-btn-text">Save to Mindfolio</span>
          <span id="save-btn-loader" class="hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="spin"
            >
              <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </svg>
            Saving…
          </span>
        </button>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
